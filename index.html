<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>N'EPS Badminton — Situations</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #e8eef8;
      --surface: #ffffff;
      --sf2:     #f4f7fc;
      --ink:     #0d1b2e;
      --ink2:    #3d5166;
      --ink3:    #7a90a8;
      --navy:    #0a2045;
      --blue:    #1254cc;
      --blue2:   #1a68f0;
      --sky:     #dce8fd;
      --orange:  #f05a1a;
      --green:   #1a8f52;
      --red:     #c8183a;
      --r:       10px;
      --rs:      7px;
      --ff-h:    'Syne', sans-serif;
      --ff-b:    'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--ff-b);
      font-size: 13px;
      color: var(--ink);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 5px;
      gap: 3px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--navy);
      border-radius: var(--r);
      padding: 5px 10px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg,rgba(18,84,204,.30) 0%,transparent 55%);
      pointer-events:none;
    }
    .header-grid {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .icon-slot {
      width: 38px; height: 38px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.15);
    }
    .icon-slot img { width:100%; height:100%; object-fit:contain; display:block; }

    .header-fields {
      display: flex; gap: 6px; align-items: center; flex: 1; min-width: 0;
    }
    .h-field { display:flex; flex-direction:column; gap:1px; min-width:0; }
    .h-label {
      font-family: var(--ff-h); font-size: 0.58rem; font-weight:700;
      letter-spacing:.07em; text-transform:uppercase; color:rgba(255,255,255,.50);
      line-height:1;
    }
    .header input {
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px; color: #fff;
      padding: 4px 8px; font: 500 0.80rem var(--ff-b);
      height: 26px; outline: none; width: 100%;
      transition: background .15s, border-color .15s;
    }
    .header input::placeholder { color:rgba(255,255,255,.30); }
    .header input:focus { background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.40); }

    .header-actions {
      display: flex; gap: 4px; align-items: center; flex-shrink: 0;
    }
    .nb-sit-wrap { display:flex; flex-direction:column; gap:1px; align-items:center; }
    .nb-sit-label {
      font-family:var(--ff-h); font-size:0.55rem; font-weight:700;
      letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.45);
    }
    .situation-toolbar { display:flex; gap:3px; }

    /* ── BUTTONS global ── */
    button {
      font-family: var(--ff-b); font-weight:600; font-size:0.75rem;
      border:none; border-radius:var(--rs); padding:4px 8px;
      cursor:pointer; white-space:nowrap;
      transition: filter .1s, transform .08s;
      line-height: 1.2;
    }
    button:hover  { filter:brightness(1.08); transform:translateY(-1px); }
    button:active { filter:brightness(.95);  transform:translateY(0); }

    .btn-primary { background:var(--blue2); color:#fff; }
    .btn-accent  { background:var(--orange); color:#fff; }
    .btn-success { background:var(--green);  color:#fff; }
    .btn-danger  { background:var(--red);    color:#fff; }
    .btn-muted   { background:var(--sky);    color:var(--blue); }
    .btn-ghost   { background:rgba(255,255,255,.13); color:#fff; border:1px solid rgba(255,255,255,.22); }

    .situation-count-btn {
      min-width:26px; height:26px; text-align:center; padding:2px 6px;
      background:rgba(255,255,255,.13); color:rgba(255,255,255,.75);
      border:1px solid rgba(255,255,255,.22); border-radius:6px;
      font-family:var(--ff-h); font-size:0.82rem;
    }
    .situation-count-btn.active {
      background:var(--blue2); color:#fff; border-color:var(--blue2);
    }

    /* ══ LAYOUT
       body(flex col): header | main-area(flex:1) | consignes-strip
       main-area(grid 2 col): tools-panel(auto) | terrain-panel(stretch)
    ══ */
    .main-area {
      flex:1; min-height:0;
      display:grid;
      grid-template-columns: 214px 1fr;
      gap:5px;
      align-items:start;
    }
    .panel {
      background:var(--surface); border-radius:var(--r);
      border:1px solid rgba(10,32,69,.07);
      box-shadow:0 2px 10px rgba(10,32,69,.08); overflow:hidden;
    }

    /* ── GAUCHE : hauteur naturelle du contenu ── */
    .tools-panel {
      display:flex; flex-direction:column; padding:7px; gap:5px;
    }
    .tool-section { display:flex; flex-direction:column; gap:3px; }
    .tool-label, .dev-label {
      font-family:var(--ff-h); font-size:0.59rem; font-weight:800;
      letter-spacing:.09em; text-transform:uppercase; color:var(--blue);
      padding-bottom:2px; border-bottom:1px solid rgba(18,84,204,.12);
    }
    .btn-row { display:flex; flex-wrap:wrap; gap:3px; }
    .divider { height:1px; background:rgba(10,32,69,.09); }

    .player-chip {
      color:#fff; border:2px solid transparent; padding:3px 8px;
      border-radius:999px; font-size:0.72rem; font-weight:600;
      transition:all .15s; box-shadow:0 2px 6px rgba(0,0,0,.15);
    }
    .player-chip.active {
      outline:2px solid rgba(18,84,204,.40);
      box-shadow:0 0 0 4px rgba(18,84,204,.15); transform:translateY(-1px);
    }
    .shot-btn {
      color:#111; border:none; border-radius:6px;
      padding:3px 7px; font-size:0.72rem; box-shadow:0 2px 6px rgba(0,0,0,.14);
    }
    .shot-btn.active    { outline:2px solid rgba(255,255,255,.85); box-shadow:0 0 0 3px rgba(18,84,204,.30); }
    .shot-btn.last-used { outline:2px solid rgba(255,255,255,.90); box-shadow:0 0 0 3px rgba(18,84,204,.24); }
    .work-btn {
      background:var(--sky); color:var(--blue);
      border:1px solid rgba(18,84,204,.18); padding:3px 8px; border-radius:6px; font-size:0.72rem;
    }
    .work-btn.active { background:var(--blue); color:#fff; }
    .zone-btn {
      color:#fff; border-radius:6px; font-size:0.68rem; font-weight:700;
      padding:3px 6px; display:inline-flex; align-items:center; gap:2px; white-space:nowrap;
    }
    .zone-btn.active { outline:2px solid rgba(255,255,255,.85); box-shadow:0 0 0 3px rgba(18,84,204,.24); transform:translateY(-1px); }
    .hero-play-btn {
      background:linear-gradient(135deg,var(--orange),#ff7940);
      color:#fff; font-size:0.72rem; padding:4px 8px; border-radius:7px;
    }
    .hero-play-btn.active { background:linear-gradient(135deg,var(--green),#23b267); }

    /* ── DROITE : terrain s'étire sur toute la hauteur de main-area ── */
    .terrain-panel {
      align-self:stretch;
      display:flex; flex-direction:column; padding:2px; gap:0;
    }
    .situation-nav { display:flex; flex-wrap:wrap; gap:3px; flex-shrink:0; margin-bottom:2px; }
    .situation-nav-btn {
      background:var(--sky); color:var(--blue); border-radius:6px;
      padding:2px 9px; font-family:var(--ff-h); font-size:0.70rem;
      font-weight:700; border:1px solid rgba(18,84,204,.18);
    }
    .situation-nav-btn.active { background:var(--blue); color:#fff; }
    .terrain-shell {
      flex:1; min-height:0; position:relative;
      background:linear-gradient(160deg,#eef4fc,#e2ecf8);
      border-radius:8px; border:1px solid rgba(10,32,69,.08); overflow:hidden;
    }
    svg {
      position:absolute; top:0; left:0;
      width:100%; height:100%; display:block; touch-action:manipulation;
    }

    /* ── CONSIGNES : pleine largeur, écart réduit avec terrain ── */
    .consignes-strip {
      flex-shrink:0; display:flex; flex-direction:column; gap:3px;
      padding:4px 8px;
    }
    .consignes-strip .dev-label { border-bottom:1px solid rgba(18,84,204,.12); padding-bottom:2px; }
    .consignes-strip textarea { width:100%; height:48px; }

    /* ── INPUTS globaux ── */
    input[type="text"], textarea, select {
      font:500 0.78rem var(--ff-b);
      border:1px solid rgba(10,32,69,.14); border-radius:6px;
      padding:4px 8px; background:var(--sf2); color:var(--ink);
      outline:none; width:100%; transition:border-color .15s, box-shadow .15s;
    }
    input[type="text"] { height:26px; }
    input[type="text"]:focus, textarea:focus {
      border-color:var(--blue2); box-shadow:0 0 0 2px rgba(26,104,240,.12); background:#fff;
    }
    textarea { resize:none; font-size:0.75rem; line-height:1.45; }
    label {
      font-family:var(--ff-h); font-size:0.60rem; font-weight:700;
      letter-spacing:.07em; text-transform:uppercase; color:var(--ink3);
      display:block; margin-bottom:2px;
    }
    .footer-note { display:none; }

    /* ── PORTRAIT ── */
    @media (orientation: portrait) {
      html, body { height:auto; overflow:auto; }
      body { padding:8px; gap:8px; }
      .main-area { grid-template-columns:1fr; align-items:stretch; height:auto; flex:none; }
      .terrain-panel { height:55vw; min-height:180px; }
      .consignes-strip textarea { height:80px; }
    }
  </style>
</head>
<body>
<div class="header">
  <div class="header-grid">
    <div class="icon-slot"><img src="logo_app.png" alt="Logo" /></div>

    <div class="header-fields">
      <div class="h-field" style="flex:1.2; min-width:110px;">
        <span class="h-label">Nom &amp; prénom</span>
        <input id="studentName" type="text" maxlength="30" placeholder="Ex. Quentin Delisle" />
      </div>
      <div class="h-field" style="flex:1.5; min-width:130px;">
        <span class="h-label">Thème</span>
        <input id="theme" type="text" placeholder="Ex. Fixer l'adversaire au fond" />
      </div>
    </div>

    <div class="header-actions">
      <div class="nb-sit-wrap">
        <span class="nb-sit-label">Situations</span>
        <div id="situationCountButtons" class="situation-toolbar"></div>
      </div>
      <button id="saveBtn"       class="btn-primary">💾</button>
      <button id="importJsonBtn" class="btn-accent">📂</button>
      <input  id="importJsonInput" type="file" accept="application/json,.json" hidden />
      <button id="fullscreenBtn" class="btn-ghost">⛶</button>
      <button id="resetCurrentBtn" class="btn-danger">🗑</button>
      <button id="installBtn"    class="btn-success" hidden>⬇</button>
    </div>
  </div>
</div>

<div class="main-area">

  <!-- ── GAUCHE : outils + forme de travail ── -->
  <div class="panel tools-panel">

    <div class="tool-section">
      <div class="tool-label">1 · Joueurs</div>
      <div class="btn-row" id="playerButtons"></div>
    </div>

    <div class="divider"></div>

    <div class="tool-section">
      <div class="tool-label">2 · Frappes</div>
      <div class="btn-row" id="shotButtons"></div>
      <div class="btn-row" style="margin-top:4px;">
        <button id="undoShotBtn" class="btn-muted">↩ Annuler</button>
        <button id="playShotsBtn" class="hero-play-btn play-btn">🎥 Visualiser</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="tool-section">
      <div class="tool-label">3 · Zones</div>
      <div class="btn-row" id="zoneButtons"></div>
    </div>

    <div class="divider"></div>

    <div class="tool-section">
      <div class="dev-label">4 · Forme de Travail</div>
      <div class="btn-row" id="workButtons"></div>
    </div>

  </div>

  <!-- ── DROITE : terrain seul ── -->
  <div class="panel terrain-panel">
    <div id="situationNav" class="situation-nav"></div>
    <div class="terrain-shell">
      <svg id="courtSvg" viewBox="0 0 1000 560" preserveAspectRatio="xMidYMid meet" aria-label="Terrain de badminton interactif"></svg>
    </div>
  </div>

</div>

<!-- ── CONSIGNES : pleine largeur sous les 2 colonnes ── -->
<div class="panel consignes-strip">
  <div class="dev-label">5 · Consignes et Dispositif</div>
  <textarea id="deviceText" placeholder="Décris le rôle de chacun, la réussite attendue, le critère d'efficacité, les répétitions…"></textarea>
</div>

<!-- IDs fantômes pour compatibilité JS -->
<input id="situationTitle" type="text" hidden />
<div id="workAdviceDisplay" hidden></div>
<textarea id="workAdvice" hidden readonly></textarea>

<script>
(() => {
  const svg = document.getElementById('courtSvg');
  const studentName = document.getElementById('studentName');
  const theme = document.getElementById('theme');
  const situationTitle = document.getElementById('situationTitle');
  const situationCountButtons = document.getElementById('situationCountButtons');
  const deviceText = document.getElementById('deviceText');
  const workAdvice = document.getElementById('workAdvice');
  const workAdviceDisplay = document.getElementById('workAdviceDisplay');
  const playerButtons = document.getElementById('playerButtons');
  const workButtons = document.getElementById('workButtons');
  const shotButtons = document.getElementById('shotButtons');
  const zoneButtons = document.getElementById('zoneButtons');
  const importJsonInput = document.getElementById('importJsonInput');
  const situationNav = document.getElementById('situationNav');

  const works = {
    multivolant: {
      label: 'Multivolant',
      help: `Le partenaire prépare plusieurs volants et vise une ou plusieurs zones identifiées dans le terrain adverse. Utile pour travailler un coup précis, un ou plusieurs déplacements, le replacement. Possible de jouer sur l'intensité en enchaînant les lancers plus facilement.`
    },
    posteFixe: {
      label: 'Poste fixe',
      help: `Le partenaire se place dans une zone et lance les volants depuis cette zone pour créer une continuité pour celui qui travaille. Utile pour faire travailler l'atteinte d'une zone précise ou la réalisation d'un coup précis à partir de plusieurs endroits du terrain. Peut également servir pour améliorer le déplacement de celui qui travaille.`
    },
    routine: {
      label: 'Routine',
      help: `Les deux joueurs réalisent un enchaînement de coups sans variation. Utile pour améliorer son déplacement en l'anticipant car le prochain coup est déjà prévu. La routine peut être sur 2, 3, 4 ou 5 frappes consécutives.`
    },
    matchTheme: {
      label: 'Match à thème',
      help: `Opposition au cours de laquelle les joueurs doivent valoriser une zone, un coup, un enchaînement de coup qui apporte un bonus au score. On peut envisager du 2c1 ou du 1c1.`
    }
  };

  const shots = {
    service:      { label:'Service',       color:'#4f5b62', kind:'service' },
    smash:        { label:'Smash',         color:'#7CFC00', kind:'line' },
    amorti:       { label:'Amorti',        color:'#ec6aa7', kind:'drop' },
    degage:       { label:'Dégagé',        color:'#e53935', kind:'clear' },
    contreAmorti: { label:'Contre amorti', color:'#fdd835', kind:'counterdrop' },
    drive:        { label:'Drive',         color:'#fb8c00', kind:'drive' },
    kill:         { label:'Kill',          color:'#111111', kind:'kill' },
    lob:          { label:'Lob',           color:'#8e24aa', kind:'lob' }
  };

  const zoneTypes = {
    autorisee: { label:'Autorisée',  fill:'rgba(46,125,50,0.28)',   stroke:'#2e7d32', text:'OK',    textColor:'#1b5e20', icon:'✓' },
    interdite: { label:'Interdite',  fill:'rgba(244,67,54,0.24)',   stroke:'#c62828', text:'⛔',    textColor:'#b71c1c', icon:'⛔' },
    bonus:     { label:'Bonus',      fill:'rgba(201,151,0,0.26)',   stroke:'#c99700', text:'BONUS', textColor:'#b8860b', icon:'★' },
    malus:     { label:'Malus',      fill:'rgba(255,82,82,0.20)',   stroke:'#d32f2f', text:'MALUS', textColor:'#c62828', icon:'−' },
    plot:      { label:'Plot',       fill:'rgba(255,140,0,0.30)',   stroke:'#e65c00', text:'●',     textColor:'#bf4600', icon:'🔶' }
  };

  const geometry = {
    x: [60, 108, 369, 499, 629, 890, 940],
    y: [60, 92, 279, 466, 500]
  };

  const storageKey = 'eps-badminton-situations-v17';
  let deferredPrompt = null;
  const playback = { active:false, shotIndex:-1, progress:0, playerPositions:[], fromPositions:[], toPositions:[], rafId:null };

  let state = loadState() || {
    meta: { studentName: '', theme: '' },
    situations: [createSituation()],
    currentSituationIndex: 0,
    ui: {
      activeMode: 'placement',
      activePlayer: 0,
      activeShot: 'service',
      activeZoneType: 'autorisee',
      pendingShotStart: null,
      flashLabels: [],
      selectedAnnotation: null,
      lastPlacedShot: 'service',
      isPlayingShots: false,
      playIndex: -1
    }
  };

  function createSituation() {
    return {
      title: '',
      workKey: 'multivolant',
      deviceText: '',
      players: [
        { id:0, label:'Joueur vert',   color:'#4caf50', zoneId:null },
        { id:1, label:'Partenaire',    color:'#e53935', zoneId:null },
        { id:2, label:'Partenaire 2',  color:'#e53935', zoneId:null }
      ],
      shots: [],
      zoneAnnotations: []
    };
  }

  function getSituation() { return state.situations[state.currentSituationIndex]; }

  function getStudentFirstName() {
    const raw = (state.meta.studentName || studentName.value || '').trim();
    if (!raw) return 'Élève';
    return raw.split(/\s+/)[0] || 'Élève';
  }

  function getPlayerDisplayLabel(player, idx) {
    if (idx === 0) return getStudentFirstName();
    const s = getSituation();
    const secondPartnerUsed = !!s.players[2]?.zoneId;
    if (idx === 1) return secondPartnerUsed ? 'Partenaire 1' : 'Partenaire';
    if (idx === 2) return 'Partenaire 2';
    return player.label || 'Partenaire';
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(storageKey);
      const parsed = raw ? JSON.parse(raw) : null;
      if (parsed?.ui && !parsed.ui.lastPlacedShot) parsed.ui.lastPlacedShot = parsed.ui.activeShot || 'service';
      return parsed;
    } catch { return null; }
  }

  function saveState() {
    state.meta.studentName = studentName.value;
    state.meta.theme = theme.value;
    try { localStorage.setItem(storageKey, JSON.stringify(state)); } catch {}
  }

  function syncFormFromState() {
    studentName.value = state.meta.studentName || '';
    theme.value       = state.meta.theme || '';
    const s = getSituation();
    situationTitle.value = s.title || '';
    deviceText.value     = s.deviceText || '';
    workAdvice.value     = works[s.workKey]?.help || '';
    if (workAdviceDisplay) workAdviceDisplay.textContent = works[s.workKey]?.help || '';
  }

  function syncMetaCounts() {
    const s = getSituation();
    s.title      = situationTitle.value;
    s.deviceText = deviceText.value;
  }

  function resetUiTransient() {
    state.ui.pendingShotStart  = null;
    state.ui.flashLabels       = [];
    state.ui.selectedAnnotation = null;
  }

  /* ── ZONE BUILDER ── */
  function buildZones() {
    const zones = [];
    const [x0,x1,x2,xNet,x3,x4,x5] = geometry.x;
    const [y0,y1,y2,y3,y4] = geometry.y;

    function addGrid(prefix, xa, xb, ya, yb, cols, rows, side, region) {
      const cellW = (xb - xa) / cols;
      const cellH = (yb - ya) / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const zx = xa + c * cellW;
          const zy = ya + r * cellH;
          zones.push({
            id: `${prefix}-${r}-${c}`,
            x: zx, y: zy, w: cellW, h: cellH,
            cx: zx + cellW / 2, cy: zy + cellH / 2,
            side, region
          });
        }
      }
    }

    addGrid('bg-left',  x0, x1, y0, y4, 1, 3, 'left',  'alley');
    addGrid('bg-right', x4, x5, y0, y4, 1, 3, 'right', 'alley');
    addGrid('bg-botalley', x1, x2, y3, y4, 1, 1, 'left',  'back');
    addGrid('bd-botalley', x4, x5, y3, y4, 1, 1, 'right', 'back');

    addGrid('cg-up',   x1, x2, y1, y2, 4, 3, 'left',  'central-high');
    addGrid('cg-down', x1, x2, y2, y3, 4, 3, 'left',  'central-low');
    addGrid('cd-up',   x3, x4, y1, y2, 4, 3, 'right', 'central-high');
    addGrid('cd-down', x3, x4, y2, y3, 4, 3, 'right', 'central-low');

    addGrid('ag-up',   x2, xNet, y1, y2, 4, 2, 'left',  'front-high');
    addGrid('ag-down', x2, xNet, y2, y3, 4, 2, 'left',  'front-low');
    addGrid('ad-up',   xNet, x3, y1, y2, 4, 2, 'right', 'front-high');
    addGrid('ad-down', xNet, x3, y2, y3, 4, 2, 'right', 'front-low');

    return zones;
  }

  const zones = buildZones();
  const zoneById = Object.fromEntries(zones.map(z => [z.id, z]));
  const sideCenters = {
    left:  { x: (geometry.x[0] + geometry.x[3]) / 2, y: (geometry.y[0] + geometry.y[4]) / 2 },
    right: { x: (geometry.x[3] + geometry.x[6]) / 2, y: (geometry.y[0] + geometry.y[4]) / 2 }

  function areOppositeSides(a, b) {
    return zoneById[a] && zoneById[b] && zoneById[a].side !== zoneById[b].side;

  function renderSituationNav() {
    situationNav.innerHTML = '';
    state.situations.forEach((_, idx) => {
      const b = document.createElement('button');
      b.className = 'btn-muted situation-nav-btn' + (state.currentSituationIndex === idx ? ' active' : '');
      b.textContent = `Situation ${idx + 1}`;
      b.onpointerdown = (e) => {
        e.preventDefault();
        state.currentSituationIndex = idx;
        stopPlayback(false);
        resetUiTransient();
        syncFormFromState();
        renderAll();
      };
      situationNav.appendChild(b);
    });
  }

  function renderButtons() {
    /* Situation count */
    situationCountButtons.innerHTML = '';
    [1,2,3].forEach(count => {
      const b = document.createElement('button');
      b.className = 'situation-count-btn' + (state.situations.length === count ? ' active' : '');
      b.textContent = String(count);
      b.onpointerdown = (e) => {
        e.preventDefault();
        const current = state.situations.length;
        if (count > current) { for (let i=current; i<count; i++) state.situations.push(createSituation()); }
        else if (count < current) {
          state.situations = state.situations.slice(0, count);
          if (state.currentSituationIndex >= state.situations.length) state.currentSituationIndex = state.situations.length - 1;
        }
        if (state.currentSituationIndex < 0) state.currentSituationIndex = 0;
        stopPlayback(false); resetUiTransient(); syncFormFromState(); saveState(); renderAll();
      };
      situationCountButtons.appendChild(b);
    });

    renderSituationNav();

    /* Work */
    workButtons.innerHTML = '';
    Object.entries(works).forEach(([key, val]) => {
      const b = document.createElement('button');
      b.className = 'work-btn' + (getSituation().workKey === key ? ' active' : '');
      b.textContent = val.label;
      b.onpointerdown = (e) => {

    getSituation().players.forEach((player, idx) => {

      b.style.background = player.color;
      b.textContent = getPlayerDisplayLabel(player, idx);
      b.onpointerdown = (e) => { e.preventDefault(); state.ui.activePlayer = idx; state.ui.activeMode = 'placement'; stopPlayback(false); renderAll(); };
      playerButtons.appendChild(b);
    });

    /* Shots */
    shotButtons.innerHTML = '';
    Object.entries(shots).forEach(([key, shot]) => {
      const b = document.createElement('button');

  /* ── SVG HELPERS ── */
  function createSvgEl(tag, attrs = {}) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
    return el;
  }

    for (let hy = y0-6; hy <= y4+6; hy += 12) {

      netGroup.appendChild(createSvgEl('line',{x1:xNet+4,y1:hy,x2:xNet-4,y2:hy+6,stroke:'rgba(180,190,198,0.35)','stroke-width':1}));

  function drawZoneAnnotations() {
    const s = getSituation();
    const g = createSvgEl('g');
    s.zoneAnnotations.forEach((ann, annIndex) => {
      const z = zoneById[ann.zoneId];
      const t = zoneTypes[ann.type];
      if (!z || !t) return;

      if (ann.type === 'plot') {
        // Plot = petit cône orange au centre de la zone, par-dessus tout
        const r = Math.min(z.w, z.h) * 0.16;  // réduit (était 0.28)
        const sel = state.ui.selectedAnnotation === annIndex;
        const base = createSvgEl('ellipse', {
          cx: z.cx, cy: z.cy + r * 0.55, rx: r * 0.85, ry: r * 0.22,
          fill: '#c84800', 'pointer-events': 'none'
        });
        const cone = createSvgEl('polygon', {
          points: `${z.cx},${z.cy - r * 1.3} ${z.cx - r * 0.85},${z.cy + r * 0.55} ${z.cx + r * 0.85},${z.cy + r * 0.55}`,
          fill: '#ff8c00', stroke: sel ? '#fff' : '#c84800',
          'stroke-width': sel ? 2.5 : 1,
          'pointer-events': 'all', cursor: 'pointer'
        });
        cone.addEventListener('click', (e) => { e.stopPropagation(); state.ui.selectedAnnotation = annIndex; renderAll(); });
        g.appendChild(base);
        g.appendChild(cone);
        return;
      }

      const rect = createSvgEl('rect', {
        x:z.x+3, y:z.y+3, width:Math.max(0,z.w-6), height:Math.max(0,z.h-6), rx:6,
        fill:t.fill, stroke:t.stroke, 'stroke-width': state.ui.selectedAnnotation === annIndex ? 4 : 2
      });
      rect.style.cursor = 'pointer';
      rect.addEventListener('click', (e) => { e.stopPropagation(); state.ui.selectedAnnotation = annIndex; renderAll(); });
      g.appendChild(rect);
      const boxW = Math.max(0, z.w-12);
      const boxH = Math.max(0, z.h-12);
      const fs = Math.max(10, Math.min(16, boxW/(ann.type==='autorisee'?7.2:5.8), boxH*0.34));
      const text = createSvgEl('text', { x:z.cx, y:z.cy+fs*0.30, 'text-anchor':'middle', 'font-size':fs, 'font-weight':900, fill:t.textColor, 'pointer-events':'none' });
      text.textContent = t.text;
      g.appendChild(text);
    });
    svg.appendChild(g);
  }

  function pathForShot(shotKey, start, end) {
    const dx = end.cx - start.cx;
    const dy = end.cy - start.cy;
    const distance = Math.hypot(dx, dy);
    const topY = geometry.y[0] + 6;
    const peakY = (rise) => Math.max(topY, Math.min(start.cy, end.cy) - rise);
    switch (shots[shotKey].kind) {
      case 'line':
      case 'drive':
        return `M ${start.cx} ${start.cy} L ${end.cx} ${end.cy}`;
      case 'drop': {
        const rise = Math.max(22, Math.min(44, distance*0.10+8));
        return `M ${start.cx} ${start.cy} Q ${start.cx+dx*0.5} ${peakY(rise)}, ${end.cx} ${end.cy}`;
      }
      case 'clear': {
        const rise = Math.max(190, Math.min(275, distance*0.46+105));
        return `M ${start.cx} ${start.cy} Q ${start.cx+dx*0.5} ${peakY(rise)}, ${end.cx} ${end.cy}`;
      }
      case 'counterdrop': {
        const rise = Math.max(24, Math.min(52, distance*0.09+8));
        return `M ${start.cx} ${start.cy} Q ${start.cx+dx*0.5} ${peakY(rise)}, ${end.cx} ${end.cy}`;
      }
      case 'kill': {
        const c1x = start.cx+dx*0.18, c1y = start.cy+dy*0.10-10;
        const c2x = start.cx+dx*0.72, c2y = start.cy+dy*0.84;
        return `M ${start.cx} ${start.cy} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${end.cx} ${end.cy}`;
      }
      case 'lob': {
        const rise = Math.max(195, Math.min(280, distance*0.45+110));
        return `M ${start.cx} ${start.cy} Q ${start.cx+dx*0.5} ${peakY(rise)}, ${end.cx} ${end.cy}`;
      }
      case 'service': {
        const rise = Math.max(58, Math.min(108, distance*0.18+36));
        return `M ${start.cx} ${start.cy} Q ${start.cx+dx*0.5} ${peakY(rise)}, ${end.cx} ${end.cy}`;
      }
      default:
        return `M ${start.cx} ${start.cy} L ${end.cx} ${end.cy}`;
    }
  }

  function buildMarkers() {
    const defs = createSvgEl('defs');
    Object.entries(shots).forEach(([key,shot]) => {
      const marker = createSvgEl('marker', { id:'arrow-'+key, viewBox:'0 0 10 10', refX:'8.4', refY:'5', markerWidth:'3.9', markerHeight:'3.9', orient:'auto-start-reverse' });
      marker.appendChild(createSvgEl('path', { d:'M 0 0 L 10 5 L 0 10 z', fill:shot.color, stroke:shot.color }));
      defs.appendChild(marker);
    });
    return defs;
  }

  function stopPlayback(render = false) {
    playback.active = false; playback.shotIndex = -1; playback.progress = 0;
    playback.playerPositions = []; playback.fromPositions = []; playback.toPositions = [];
    if (playback.rafId) cancelAnimationFrame(playback.rafId);
    playback.rafId = null;
    state.ui.isPlayingShots = false; state.ui.playIndex = -1;
    if (render) renderAll();
  }

  function getPathMetrics(pathD, progress = 1) {
    const temp = createSvgEl('path', { d:pathD, fill:'none', stroke:'none' });
    svg.appendChild(temp);
    const total = temp.getTotalLength();
    const point = temp.getPointAtLength(Math.max(0.001, total * Math.max(0, Math.min(1, progress))));
    temp.remove();
    return { total, point };
  }

  function createShotPathElements(pathD, shotObj, shotDef, numberText, faded = false) {
    const metrics = getPathMetrics(pathD, 1);
    const gap = 22, mid = metrics.total/2;
    const before = Math.max(0, mid-gap/2);
    const after  = Math.min(metrics.total, mid+gap/2);
    const makePath = (dasharray, dashoffset, withMarker) => {
      const path = createSvgEl('path', {
        d:pathD, fill:'none', stroke:shotDef.color, color:shotDef.color,
        'stroke-width': shotObj.type==='kill'?4.5:3.6,
        'stroke-linecap':'round','stroke-linejoin':'round',
        opacity: faded?0.22:0.94,
        'stroke-dasharray':dasharray,'stroke-dashoffset':dashoffset
      });
      if (withMarker) path.setAttribute('marker-end','url(#arrow-'+shotObj.type+')');
      path.style.filter = 'drop-shadow(0 1px 0 rgba(255,255,255,0.35))';
      return path;
    };
    const first = makePath(`${before} ${Math.max(0, metrics.total-before)}`,'0',false);
    const secondVisible = Math.max(0, metrics.total-after);
    const second = makePath(`${secondVisible} ${after}`, String(metrics.total-after), true);
    const midpoint = getPathMetrics(pathD, 0.5).point;
    const labelBg = createSvgEl('circle', { cx:midpoint.x, cy:midpoint.y, r:12, fill:'#ffffff', opacity:0.96 });
    const label = createSvgEl('text', { x:midpoint.x, y:midpoint.y+5, fill:shotDef.color, 'font-size':17, 'font-weight':900, 'text-anchor':'middle', opacity:faded?0.7:1 });
    label.textContent = numberText;
    return { first, second, labelBg, label };
  }

  function getRenderedPlayerPositions() {
    const s = getSituation();
    if (!playback.active || playback.shotIndex < 0) {
      return s.players.map(player => {
        const z = player.zoneId && zoneById[player.zoneId];
        return z ? { x:z.cx, y:z.cy } : null;
      });
    }
    return s.players.map((player, idx) => {
      const base   = playback.fromPositions[idx] || playback.playerPositions[idx] || null;
      const target = playback.toPositions[idx] || base;
      if (!base) return null;
      const t = playback.progress;
      return { x: base.x+(target.x-base.x)*t, y: base.y+(target.y-base.y)*t };
    });
  }

  function drawShots() {
    const s = getSituation();
    svg.appendChild(buildMarkers());
    const g = createSvgEl('g');
    let shuttlePoint = null;
    s.shots.forEach((shotObj, idx) => {
      const start = zoneById[shotObj.startZoneId], end = zoneById[shotObj.endZoneId];
      if (!start || !end) return;
      const shotDef = shots[shotObj.type];
      const pathD = pathForShot(shotObj.type, start, end);
      const isPast    = playback.active && idx < playback.shotIndex;
      const isCurrent = playback.active && idx === playback.shotIndex;
      const isFuture  = playback.active && idx > playback.shotIndex;
      if (isFuture) return;
      if (!playback.active || isPast) {
        const split = createShotPathElements(pathD, shotObj, shotDef, String(idx+1), isPast && playback.active);
        g.appendChild(split.first); g.appendChild(split.second);
        g.appendChild(split.labelBg); g.appendChild(split.label);
      } else if (isCurrent) {
        const path = createSvgEl('path', { d:pathD, fill:'none', stroke:shotDef.color, color:shotDef.color, 'stroke-width':shotObj.type==='kill'?4.5:3.6, 'stroke-linecap':'round','stroke-linejoin':'round', opacity:0.98 });
        const metrics = getPathMetrics(pathD, playback.progress);
        path.setAttribute('stroke-dasharray', String(metrics.total));
        path.setAttribute('stroke-dashoffset', String(metrics.total*(1-playback.progress)));
        path.style.filter = 'drop-shadow(0 1px 0 rgba(255,255,255,0.35))';
        g.appendChild(path);
        const midpoint = getPathMetrics(pathD, 0.5).point;
        const labelBg = createSvgEl('circle',{ cx:midpoint.x, cy:midpoint.y, r:12, fill:'#ffffff', opacity:0.96 });
        const label = createSvgEl('text',{ x:midpoint.x, y:midpoint.y+5, fill:shotDef.color, 'font-size':17, 'font-weight':900, 'text-anchor':'middle' });
        label.textContent = String(idx+1);
        g.appendChild(labelBg); g.appendChild(label);
        shuttlePoint = { x:metrics.point.x, y:metrics.point.y, color:shotDef.color };
      }
    });
    if (shuttlePoint) drawShuttlecock(g, shuttlePoint.x, shuttlePoint.y, -20, 0.9);
    svg.appendChild(g);
  }

  function drawShuttlecock(parent, x, y, angleDeg, scale = 1) {
    const g = createSvgEl('g', { transform:`translate(${x} ${y}) rotate(${angleDeg}) scale(${scale})` });
    const cork        = createSvgEl('ellipse', { cx:0, cy:0, rx:6, ry:4.6, fill:'#fff7e6', stroke:'#5d4037','stroke-width':1.4 });
    const band        = createSvgEl('path', { d:'M -4 -1 Q 0 1 4 -1', fill:'none', stroke:'#8d6e63','stroke-width':1 });
    const featherFill = createSvgEl('path', { d:'M 4 -1 L 16 -9 L 15 -4 L 18 0 L 15 4 L 16 9 L 4 1 Z', fill:'#ffffff', stroke:'#546e7a','stroke-width':1.1,'stroke-linejoin':'round' });
    const feather1    = createSvgEl('line', { x1:7,  y1:-1, x2:15,   y2:-6, stroke:'#90a4ae','stroke-width':0.9 });
    const feather2    = createSvgEl('line', { x1:7.5,y1:0,  x2:16.5, y2:0,  stroke:'#90a4ae','stroke-width':0.9 });
    const feather3    = createSvgEl('line', { x1:7,  y1:1,  x2:15,   y2:6,  stroke:'#90a4ae','stroke-width':0.9 });
    [featherFill, feather1, feather2, feather3, cork, band].forEach(el => g.appendChild(el));
    parent.appendChild(g);
  }

  function drawStickPlayer(parent, x, y, side, color, labelText, motionPhase = 0) {
    // facing: left players → right (positive scale), right players → left (mirrored)
    const facing = side === 'right' ? -1 : 1;
    const bounce = Math.sin(motionPhase * Math.PI * 2) * 2.0;

    function shadeColor(hex, t) { // t=0 → black, t=1 → original
      const r=parseInt(hex.slice(1,3),16), g2=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      return `rgb(${Math.round(r*t)},${Math.round(g2*t)},${Math.round(b*t)})`;
    }
    const cMain = color;
    const cDark = shadeColor(color, 0.65);
    const skin   = '#d4956a';
    const skinD  = '#b87850';
    const hair   = '#1a1010';
    const shoe   = '#1a1a1a';
    const wh     = 'rgba(255,255,255,0.80)';
    const str    = 'rgba(200,225,200,0.85)';

    // ── Skeleton Y anchors (local space, x=0 = player centre) ──
    const gY  = y + 28;               // ground
    const akY = gY - 4;               // ankle
    const knFY= gY - 26 - bounce*0.3; // front knee
    const knBY= gY - 22 - bounce*0.2; // back knee
    const hiY = gY - 50 - bounce;     // hip
    const waY = hiY + 7;              // waist / bottom of torso
    const shY = hiY - 22;             // shoulders  ← SLIMMER: was -26
    const nkBY= shY - 4;              // neck base
    const hdY = shY - 20;             // head centre

    // Foot/knee X — narrow stance for slim look
    const fFX= 13, fBX= -11, knFX= 8, knBX= -7;

    // ── Arm articulation points ──
    // Racket arm (back/left): shoulder → elbow wide out → hand raised
    const rShX= -7,  rShY= shY+2;
    const rElX= -22, rElY= shY-10;   // elbow pushed far out sideways
    const rHdX= -16, rHdY= shY-28;   // hand — not too close to head

    // Balance/aiming arm (front/right): hand raised to eye level
    const fShX=  7,  fShY= shY+2;
    const fElX=  19, fElY= shY-8;    // elbow mid-height
    const fHdX=  17, fHdY= shY-24;   // hand at eye level

    // Racket head centre (above hand along shaft direction)
    const rfx= rHdX - 6, rfy= rHdY - 34;

    // ── Helpers ──
    const mk = (tag, a) => { const e=createSvgEl(tag,a); return e; };
    const P = (d, fill, stroke, sw, op) => {
      const e=createSvgEl('path',{d, fill:fill||'none', stroke:stroke||'none', 'stroke-width':sw||0, 'stroke-linecap':'round','stroke-linejoin':'round'});
      if (op!==undefined) e.setAttribute('opacity', String(op)); return e;
    };
    const C  = (cx,cy,r,f,s,sw) => mk('circle', {cx,cy,r,fill:f, stroke:s||'none','stroke-width':sw||0});
    const E  = (cx,cy,rx,ry,f,s,sw) => mk('ellipse',{cx,cy,rx,ry,fill:f,stroke:s||'none','stroke-width':sw||0});
    const L  = (x1,y1,x2,y2,s,sw,op) => {
      const e=createSvgEl('line',{x1,y1,x2,y2,stroke:s,'stroke-width':sw,'stroke-linecap':'round'});
      if(op!==undefined) e.setAttribute('opacity',String(op)); return e;
    };

    const g = createSvgEl('g', { transform:`translate(${x} 0) scale(${facing} 1)` });

    // Ground shadow
    g.appendChild(E(0, gY+4, 22, 5, 'rgba(0,0,0,0.20)'));

    // ── BACK LEG ──
    g.appendChild(L(0,hiY, knBX,knBY, cDark, 7, 0.80));
    g.appendChild(L(knBX,knBY, fBX,akY, cDark, 6, 0.80));
    g.appendChild(C(knBX,knBY, 4, cDark,'none',0));          // knee joint
    // back shoe blanc
    g.appendChild(P(`M ${fBX-7} ${akY+1} Q ${fBX-8} ${gY} ${fBX-4} ${gY+2} L ${fBX+5} ${gY+2} Q ${fBX+7} ${gY} ${fBX+5} ${akY+1} Z`, '#f0f0f0','#c8c8c8',0.8, 0.80));

    // ── FRONT LEG ──
    g.appendChild(L(0,hiY, knFX,knFY, cMain, 9));
    g.appendChild(L(knFX,knFY, fFX,akY, cMain, 8));
    g.appendChild(C(knFX,knFY, 4.5, cDark,'none',0));         // knee joint
    // sock white band
    g.appendChild(L(fFX-4,akY+1, fFX+5,akY+1, wh, 2.5));
    // front shoe blanc
    g.appendChild(P(`M ${fFX-5} ${akY+2} Q ${fFX-6} ${gY} ${fFX-2} ${gY+3} L ${fFX+9} ${gY+3} Q ${fFX+12} ${gY+1} ${fFX+11} ${akY+2} Z`, '#f0f0f0','#c8c8c8',0.8));
    g.appendChild(L(fFX-2,gY+1, fFX+8,gY+1, '#aaaaaa', 1.2)); // lace

    // ── SHORT — blanc, moins large (±8 au lieu de fBX/fFX) ──
    const sL = -8, sR = 8; // bords du short, plus étroit que les jambes
    g.appendChild(P(`M ${sL} ${hiY+3} Q ${sL-2} ${waY+7} ${sL+1} ${waY+14} Q 0 ${waY+16} ${sR-1} ${waY+14} Q ${sR+1} ${waY+7} ${sR} ${hiY+3} Q 0 ${hiY+6} ${sL} ${hiY+3} Z`, '#e8edf2','none',0));
    g.appendChild(P(`M ${sL} ${hiY+3} Q ${sL-2} ${waY+7} ${sL+1} ${waY+14} Q -2 ${waY+15} -2 ${waY+7} Q -2 ${waY-1} -2 ${hiY+5} Q 0 ${hiY+6} ${sL} ${hiY+3} Z`, '#c8d0da','none',0, 0.55));
    g.appendChild(P(`M ${sL} ${hiY+3} Q 0 ${hiY+6} ${sR} ${hiY+3}`, 'none', '#b0b8c4', 1.5));
    g.appendChild(P(`M ${sL+1} ${waY+14} Q 0 ${waY+16} ${sR-1} ${waY+14}`, 'none', '#b0b8c4', 1.2));

    // ── TORSO  (slim: ±9 shoulders, ±7 waist) ──
    g.appendChild(P(`M -7 ${waY} Q -10 ${(waY+shY)/2} -9 ${shY+1} Q 0 ${shY-1} 9 ${shY+1} Q 10 ${(waY+shY)/2} 7 ${waY} Q 0 ${waY+2} -7 ${waY} Z`, cMain,'none',0));
    // shadow left half
    g.appendChild(P(`M -7 ${waY} Q -10 ${(waY+shY)/2} -9 ${shY+1} Q 0 ${shY} 0 ${waY} Q 0 ${waY+2} -7 ${waY} Z`, cDark,'none',0, 0.55));
    // collar
    g.appendChild(P(`M -5 ${shY+1} Q 0 ${shY-3} 5 ${shY+1}`, 'none', wh, 2.0));
    // bottom band
    g.appendChild(P(`M -7 ${waY} Q 0 ${waY+3} 7 ${waY}`, 'none', wh, 1.5));

    // ── BACK ARM  (racket) — upper arm → elbow → forearm ──
    g.appendChild(L(rShX,rShY, rElX,rElY, cMain, 6));   // upper arm
    g.appendChild(C(rElX,rElY, 3.5, cDark,'none',0));    // elbow joint
    g.appendChild(L(rElX,rElY, rHdX,rHdY, cDark, 5));   // forearm

    // Racket: grip → shaft → throat → head
    g.appendChild(L(rHdX,rHdY, rHdX-5,rHdY-12, '#7a4520', 4.5)); // grip
    g.appendChild(L(rHdX,rHdY, rHdX-2,rHdY-6, wh, 2, 0.75));     // grip tape
    g.appendChild(L(rHdX-5,rHdY-12, rfx+2,rfy+16, '#5d3a18', 3.5)); // shaft
    // throat (V shape)
    g.appendChild(P(`M ${rfx-5} ${rfy+14} L ${rfx+2} ${rfy+16} L ${rfx+7} ${rfy+12}`, 'none','#4a2e10', 2.5));
    // frame oval
    g.appendChild(E(rfx, rfy, 11, 16, 'none','#2a2a2a', 3.2));
    // strings
    for (let sv=-1; sv<=1; sv++) g.appendChild(L(rfx+sv*5, rfy-14, rfx+sv*5, rfy+13, str, 0.9));
    for (let sh=-2; sh<=2; sh++) g.appendChild(L(rfx-10, rfy+sh*5, rfx+10, rfy+sh*5, str, 0.9));

    // ── FRONT ARM (visée) — main à hauteur des yeux ──
    g.appendChild(L(fShX,fShY, fElX,fElY, cMain, 6));
    g.appendChild(C(fElX,fElY, 3.5, cDark,'none',0));
    g.appendChild(L(fElX,fElY, fHdX,fHdY, cMain, 5));
    g.appendChild(C(fHdX, fHdY, 4, skin, skinD, 1));
    // doigts légèrement vers le haut — pointant vers le volant
    g.appendChild(L(fHdX-1,fHdY-3, fHdX-3,fHdY-9, skinD, 1.8));
    g.appendChild(L(fHdX+1,fHdY-4, fHdX+1,fHdY-10,skinD, 1.8));
    g.appendChild(L(fHdX+3,fHdY-3, fHdX+5,fHdY-8, skinD, 1.8));

    // ── NECK ──
    g.appendChild(P(`M -4 ${nkBY+3} Q 0 ${nkBY-2} 4 ${nkBY+3} Q 0 ${nkBY+5} -4 ${nkBY+3} Z`, skin,'none',0));

    // ── HEAD — full face, centred ──
    // Head shape
    g.appendChild(E(0, hdY, 13, 15, skin, skinD, 1));
    // Ears (both sides — face seen from front)
    g.appendChild(E(-13, hdY+2, 3.5, 5, skinD,'none',0));
    g.appendChild(E( 13, hdY+2, 3.5, 5, skinD,'none',0));
    // Hair cap
    g.appendChild(P(`M -13 ${hdY+3} Q -12 ${hdY-17} 0 ${hdY-17} Q 12 ${hdY-17} 13 ${hdY+3} Q 6 ${hdY-5} 0 ${hdY-6} Q -6 ${hdY-5} -13 ${hdY+3} Z`, hair,'none',0));
    // Left eyebrow
    g.appendChild(P(`M -8 ${hdY-5} Q -5 ${hdY-7} -2 ${hdY-5}`, 'none', hair, 1.4));
    // Right eyebrow
    g.appendChild(P(`M  2 ${hdY-5} Q  5 ${hdY-7}  8 ${hdY-5}`, 'none', hair, 1.4));
    // Left eye white
    g.appendChild(E(-5, hdY+1, 4, 3, '#ffffff','none',0));
    // Left iris
    g.appendChild(C(-5, hdY+1, 2, '#2a1205','none',0));
    g.appendChild(C(-4, hdY,   0.9,'#ffffff','none',0)); // highlight
    // Right eye white
    g.appendChild(E( 5, hdY+1, 4, 3, '#ffffff','none',0));
    // Right iris
    g.appendChild(C( 5, hdY+1, 2, '#2a1205','none',0));
    g.appendChild(C( 6, hdY,   0.9,'#ffffff','none',0)); // highlight
    // Nose (simple bridge + nostrils)
    g.appendChild(P(`M 0 ${hdY+3} L 0 ${hdY+7} Q -2 ${hdY+9} -3 ${hdY+8}`, 'none', skinD, 1.3));
    g.appendChild(P(`M 0 ${hdY+7} Q  2 ${hdY+9}  3 ${hdY+8}`, 'none', skinD, 1.3));
    // Mouth
    g.appendChild(P(`M -5 ${hdY+12} Q 0 ${hdY+15} 5 ${hdY+12}`, 'none', '#a06040', 1.8));
    // Chin line hint
    g.appendChild(P(`M -5 ${hdY+13} Q 0 ${hdY+16} 5 ${hdY+13}`, 'none', skinD, 0.8, 0.4));

    parent.appendChild(g);

    // ── NAME BADGE ──
    const bW = Math.max(52, labelText.length * 7.8);
    const bX = x - bW/2, bY = gY + 9;
    const bg = createSvgEl('g');
    bg.appendChild(mk('rect',{x:bX+1,y:bY+2,width:bW,height:18,rx:9,fill:'rgba(0,0,0,0.20)'}));
    bg.appendChild(mk('rect',{x:bX,y:bY,width:bW,height:18,rx:9,fill:cMain,stroke:'#fff','stroke-width':1.5}));
    const lbl = createSvgEl('text',{x:String(x),y:String(bY+13),'text-anchor':'middle','font-size':'11','font-weight':'800','font-family':'DM Sans,Arial,sans-serif',fill:'#fff','letter-spacing':'0.04em'});
    lbl.textContent = labelText;
    bg.appendChild(lbl);
    parent.appendChild(bg);
  }

  function drawPlayers() {
    const s = getSituation();
    const positions = getRenderedPlayerPositions();
    const g = createSvgEl('g');
    s.players.forEach((player, idx) => {
      const pos = positions[idx];
      if (!pos) return;
      const side = player.zoneId && zoneById[player.zoneId]?.side;
      drawStickPlayer(g, pos.x, pos.y, side, idx===0?'#67c96b':'#e53935', getPlayerDisplayLabel(player, idx), playback.active?playback.progress:0);
    });
    svg.appendChild(g);
  }

  function drawFlashLabels() {
    const now = Date.now();
    state.ui.flashLabels = state.ui.flashLabels.filter(l => now - l.ts < 3000);
    if (!state.ui.flashLabels.length) return;
    const g = createSvgEl('g');
    state.ui.flashLabels.forEach(item => {
      const text = createSvgEl('text',{x:item.x,y:item.y,fill:item.color,'font-size':20,'font-weight':900,'text-anchor':'middle'});
      text.textContent = item.text;
      g.appendChild(text);
    });
    svg.appendChild(g);
    requestAnimationFrame(() => setTimeout(renderAll, 150));
  }

  function getZoneFromPoint(px, py) {
    const padding = 16;
    let best = null, bestScore = Infinity;
    zones.forEach(z => {
      const inside = px>=z.x-padding && px<=z.x+z.w+padding && py>=z.y-padding && py<=z.y+z.h+padding;
      if (!inside) return;
      const score = (px-z.cx)**2 + (py-z.cy)**2;
      if (score < bestScore) { bestScore = score; best = z; }
    });
    if (best) return best;
    zones.forEach(z => {
      if (px>=z.x && px<=z.x+z.w && py>=z.y && py<=z.y+z.h) {
        const score = (px-z.cx)**2 + (py-z.cy)**2;
        if (score < bestScore) { bestScore = score; best = z; }
      }
    });
    return best;
  }

  function drawHitAreas() {
    const [x0,,,,,,x5] = geometry.x;
    const [y0,,,,y4] = geometry.y;
    const overlay = createSvgEl('rect', { x:x0, y:y0, width:x5-x0, height:y4-y0, fill:'rgba(255,255,255,0.001)' });
    overlay.style.cursor = 'pointer';
    const handler = (e) => {
      e.preventDefault(); e.stopPropagation();
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const transformed = pt.matrixTransform(svg.getScreenCTM().inverse());
      const zone = getZoneFromPoint(transformed.x, transformed.y);
      if (zone) onZoneClick(zone.id);
    };
    overlay.addEventListener('pointerdown', handler, { passive:false });
    overlay.addEventListener('click', handler);
    svg.appendChild(overlay);
  }

  function onZoneClick(zoneId) {
    const s = getSituation();
    if (state.ui.activeMode === 'placement') {
      stopPlayback(false);
      s.players[state.ui.activePlayer].zoneId = zoneId;
      saveState(); renderAll(); return;
    }
    if (state.ui.activeMode === 'frappe') {
      stopPlayback(false);
      if (!state.ui.pendingShotStart) {
        state.ui.pendingShotStart = zoneId;
        const z = zoneById[zoneId];
        state.ui.flashLabels.push({ text:'Début', x:z.cx, y:z.cy-12, color:shots[state.ui.activeShot].color, ts:Date.now() });
        renderAll(); return;
      }
      const startZoneId = state.ui.pendingShotStart;
      if (!areOppositeSides(startZoneId, zoneId)) {
        const z = zoneById[zoneId];
        state.ui.flashLabels.push({ text:'Fin dans l\'autre camp', x:z.cx, y:z.cy-12, color:'#c62828', ts:Date.now() });
        renderAll(); return;
      }
      s.shots.push({ type:state.ui.activeShot, startZoneId, endZoneId:zoneId });
      state.ui.lastPlacedShot = state.ui.activeShot;
      const z1 = zoneById[startZoneId], z2 = zoneById[zoneId];
      state.ui.flashLabels.push({ text:'Début', x:z1.cx, y:z1.cy-12, color:shots[state.ui.activeShot].color, ts:Date.now() });
      state.ui.flashLabels.push({ text:'Fin',   x:z2.cx, y:z2.cy-12, color:shots[state.ui.activeShot].color, ts:Date.now() });
      state.ui.pendingShotStart = null;
      saveState(); renderAll(); return;
    }
    if (state.ui.activeMode === 'zone') {
      stopPlayback(false);
      const activeType = state.ui.activeZoneType;

      if (activeType === 'plot') {
        // Les plots sont indépendants : on peut en ajouter plusieurs par zone
        // Un clic sur une zone avec plot actif : ajoute un plot (ou le retire si déjà un plot sur cette zone exacte)
        const plotIdx = s.zoneAnnotations.findIndex(a => a.zoneId === zoneId && a.type === 'plot');
        if (plotIdx >= 0) {
          s.zoneAnnotations.splice(plotIdx, 1);
          state.ui.selectedAnnotation = null;
        } else {
          s.zoneAnnotations.push({ zoneId, type: 'plot' });
          state.ui.selectedAnnotation = s.zoneAnnotations.length - 1;
        }
      } else {
        // Zones colorées : une seule par case (hors plots), les plots sont conservés
        const zoneIdx = s.zoneAnnotations.findIndex(a => a.zoneId === zoneId && a.type !== 'plot');
        if (zoneIdx >= 0 && s.zoneAnnotations[zoneIdx].type === activeType) {
          s.zoneAnnotations.splice(zoneIdx, 1);
          state.ui.selectedAnnotation = null;
        } else {
          if (zoneIdx >= 0) s.zoneAnnotations.splice(zoneIdx, 1);
          s.zoneAnnotations.push({ zoneId, type: activeType });
          state.ui.selectedAnnotation = s.zoneAnnotations.length - 1;
        }
      }
      saveState(); renderAll();
    }
  }

  function updateStatus() {}

  function renderAll() {
    const s = getSituation();
    s.title      = situationTitle.value;
    s.deviceText = deviceText.value;
    syncMetaCounts();
    drawCourtBase();
    drawZoneAnnotations();
    drawShots();
    drawPlayers();
    drawFlashLabels();
    drawHitAreas();
    renderButtons();
    updateStatus();
    workAdvice.value = works[s.workKey].help;
    if (workAdviceDisplay) workAdviceDisplay.textContent = works[s.workKey].help;
  }

  [studentName, theme, situationTitle, deviceText].forEach(el => el.addEventListener('input', () => { saveState(); renderAll(); }));

  document.getElementById('saveBtn').onclick = () => {
    saveState();
    const payload = JSON.stringify(state, null, 2);
    const blob    = new Blob([payload], { type:'application/json' });
    const url     = URL.createObjectURL(blob);
    const a       = document.createElement('a');
    const safeName = ((state.meta.studentName||'lecon').trim().replace(/[^a-zA-Z0-9À-ÿ-_ ]+/g,'').replace(/\s+/g,'_')||'lecon');
    a.href = url;
    a.download = `${safeName}_badminton_lecon.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 500);
    renderAll();
  };

  document.getElementById('resetCurrentBtn').onclick = () => {
    state.situations[state.currentSituationIndex] = createSituation();
    resetUiTransient(); syncFormFromState(); saveState(); renderAll();
  };

  document.getElementById('undoShotBtn').onclick = () => {
    getSituation().shots.pop(); saveState(); renderAll();
  };

  function startShotsPlayback() {
    const list = getSituation().shots;
    if (!list.length) return;
    stopPlayback(false);
    playback.active = true;
    playback.playerPositions = getSituation().players.map(player => {
      const z = player.zoneId && zoneById[player.zoneId];
      return z ? { x:z.cx, y:z.cy } : null;
    });
    state.ui.isPlayingShots = true;
    state.ui.playIndex = 0;

    function animateShot(idx) {
      if (!playback.active) return;
      if (idx >= list.length) { setTimeout(() => stopPlayback(true), 280); return; }
      const shot = list[idx];
      const endZone = zoneById[shot.endZoneId];
      const receiveSide = endZone?.side;
      playback.shotIndex = idx;
      playback.fromPositions = playback.playerPositions.map(p => p?{...p}:null);
      const startZone = zoneById[shot.startZoneId];
      const hitterSide = startZone?.side;
      playback.toPositions = playback.playerPositions.map((p, playerIdx) => {
        if (!p) return null;
        const baseZone = getSituation().players[playerIdx].zoneId && zoneById[getSituation().players[playerIdx].zoneId];
        if (!baseZone) return {...p};
        if (baseZone.side === receiveSide && endZone) return { x:endZone.cx, y:endZone.cy };
        if (baseZone.side === hitterSide) {
          const center = sideCenters[hitterSide];
          return center ? { x:center.x, y:center.y } : {...p};
        }
        return {...p};
      });
      const duration = 1100;
      const startTime = performance.now();
      const frame = (now) => {
        if (!playback.active) return;
        const t = Math.min(1, (now - startTime) / duration);
        playback.progress = t;
        state.ui.playIndex = idx;
        renderAll();
        if (t < 1) { playback.rafId = requestAnimationFrame(frame); }
        else {
          playback.playerPositions = playback.toPositions.map(p => p?{...p}:null);
          setTimeout(() => animateShot(idx+1), 180);
        }
      };
      playback.rafId = requestAnimationFrame(frame);
    }
    animateShot(0);
  }

  document.getElementById('playShotsBtn').onclick = () => {
    if (playback.active) { stopPlayback(true); return; }
    startShotsPlayback();
  };

  function importJsonFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !Array.isArray(parsed.situations) || !parsed.ui) throw new Error('Format JSON invalide');
        stopPlayback(false);
        state = parsed;
        if (!state.ui.lastPlacedShot) state.ui.lastPlacedShot = state.ui.activeShot || 'service';
        if (state.ui.isPlayingShots === undefined) { state.ui.isPlayingShots = false; state.ui.playIndex = -1; }
        if (!state.situations.length) state.situations = [createSituation()];
        state.currentSituationIndex = Math.max(0, Math.min(state.currentSituationIndex||0, state.situations.length-1));
        stopPlayback(false); resetUiTransient(); syncFormFromState(); saveState(); renderAll();
      } catch (e) { alert('Import JSON impossible.'); }
    };
    reader.readAsText(file);
  }

  document.getElementById('importJsonBtn').onclick = () => importJsonInput.click();
  importJsonInput.addEventListener('change', (e) => importJsonFile(e.target.files?.[0]));

  document.getElementById('fullscreenBtn').onclick = async () => {
    if (!document.fullscreenElement) await document.documentElement.requestFullscreen().catch(()=>{});
    else await document.exitFullscreen().catch(()=>{});
  };

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('installBtn').hidden = false;
  });

  document.getElementById('installBtn').onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBtn').hidden = true;
  };

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
  }

  syncFormFromState();
  renderAll();
})();
</script>
</body>
